## Phase Rules

### proposal

- Single PR for entire proposal
- Keep proposal under 200 lines

### spec

- Single PR for all spec artifacts
- Keep specs under 400 lines combined
- Prefer markdown tables over nested lists

### design

- Single PR for design artifacts
- Include rationale for key decisions
- Reference existing specs by filename

### tasks

- Single PR for task breakdown
- Group related tasks into logical units

### apply

- Single PR for all implementation
- Reference task IDs in commit messages

### verify

- Single PR for verification report
- Include test results, manual checklist items

### archive

- Single PR to sync delta specs to archive
- Minimize diff noise